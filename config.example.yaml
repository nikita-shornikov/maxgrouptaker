# Пример конфигурации для script2_web_add_to_group.py
# Скопируйте в config.yaml и при необходимости отредактируйте селекторы.

# Автоматизация веб-версии MAX (Playwright)
web_automation:
  timeout: 60000  # Таймаут ожидания элементов (мс)

  # CSS/XPath селекторы под интерфейс web.max.ru (при изменении интерфейса — обновите)
  selectors:
    search_input: "input[placeholder*='Найти'], input[placeholder*='Поиск']"
    search_container: ".search"
    chat_list_item: ".item[data-index]"
    chat_list_button: ".item[data-index] button.cell"
    scrollable_list: ".scrollListScrollable, .scrollable"
    group_info_button: "button[aria-label*='Открыть профиль'], button[aria-label*='открыть профиль'], button.main.content--clickable"
    members_tab: "button:has-text('Участники'), button:has-text('участники')"
    members_list: ".scrollListScrollable, [data-testid='members-list']"
    member_item: "[data-member-id], [data-user-id], .item[data-index]"
    add_members_button: "button:has-text('Подписчики'), button.cell--clickable:has-text('Подписчики'), button.cell--primary:has-text('Подписчики')"
    add_modal: ".modal"
    add_modal_search: ".modal .search input, .modal input[placeholder*='Поиск'], .modal input[placeholder*='Найти по имени']"
    add_by_phone_input: "input[type='tel'], input[placeholder*='номер'], .modal .search input"
    add_modal_list: ".modal .list .item[data-index]"
    add_modal_item_button: ".modal .item[data-index] button.cell--clickable"
    add_button: "button[aria-label='Добавить'], button:has-text('Добавить')"
    close_button: "button[aria-label*='Закрыть'], button[aria-label*='закрыть']"
    confirm_button: "button:has-text('Подтвердить'), button:has-text('подтвердить')"
